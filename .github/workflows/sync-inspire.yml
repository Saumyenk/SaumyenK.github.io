name: Sync INSPIRE publications

on:
  schedule:
    - cron: '0 3 * * *'   # runs every day at 3 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch from INSPIRE
        run: |
          curl -s "https://inspirehep.net/api/literature?sort=mostrecent&size=50&page=1&q=a%201965059&fields=titles,authors,publication_info,document_type,arxiv_eprints,id,citation_count,preprint_date,earliest_date,documents" \
            -o publications.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add publications.json
          git diff --cached --quiet || git commit -m "Sync publications from INSPIRE"
          git push
